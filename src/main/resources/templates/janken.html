<html lang="ja">
    <header>
        <meta charset="UTF-8" />
        <title>janken</title>
    </header>
    <body>
        <a href="/logout">ログアウト</a>
        <h1>Janken GAME!</h1>
        <p>Hi [[${username}]]</p>
        <div th:each="user:${users}">
            <ul>
                <li th:text="${user.name}"></li>
            </ul>
          </div>
        <div>
            <a href="/jankengame?hand=Gu">グー</a>
            <a href="/jankengame?hand=Choki">チョキ</a>
            <a href="/jankengame?hand=Pa">パー</a>
        </div>
        <div th:if="${result}">
            <p>あなたの手 [[${player_hand}]]</p>
            <p>相手の手 [[${cpu_hand}]]</p>
            <p>結果 [[${result}]]</p>
        </div>
    </body>
</html>
